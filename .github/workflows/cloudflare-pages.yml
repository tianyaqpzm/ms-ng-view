name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["master", "dev", "release_/*"]
  pull_request:
    branches:
      - master  # 向主分支发起PR时触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Angular 21 使用 Node.js 20 或 22 (LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test -- --watch=false

      # 构建 Angular 项目
      - name: Build Angular App
        run: npm run build
        env:
          NODE_ENV: production

      # 🔍 新增调试步骤：打印 dist 目录结构
      - name: Debug - List Output Files
        run: ls -R dist
        
      # 部署到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 根据 angular.json 配置，构建输出在 dist 目录
          # 项目名称：timekeeper 
          # 动态传入 --branch=${{ github.ref_name }}
          # 如果是 master，CF 会发布到正式环境
          # 如果是 dev，CF 会发布到 dev.timekeeper.pages.dev (测试环境)
          command: pages deploy dist --project-name=timekeeper --branch=${{ github.ref_name }}
