<div class="p-6 dark:bg-[#1e1f20] dark:text-[#e3e3e3] max-w-[400px]">
  <h2 mat-dialog-title class="!flex !items-center !gap-2 !text-xl !font-medium !mb-4">
    <mat-icon class="!text-red-500">delete_outline</mat-icon>
    {{ 'CHAT.DELETE_SESSION' | translate }}
  </h2>
  <mat-dialog-content class="!text-sm !text-gray-600 dark:!text-[#c4c7c5]">
    {{ 'SIDEBAR.DELETE_CONFIRM' | translate }}
  </mat-dialog-content>
  <mat-dialog-actions align="end" class="!mt-6 !gap-3">
    <button mat-button class="!rounded-full" (click)="dialogRef.close(false)">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    <button mat-flat-button color="warn" class="!rounded-full !bg-red-500 !text-white" (click)="dialogRef.close(true)">
      {{ 'COMMON.DELETE' | translate }}
    </button>
  </mat-dialog-actions>
</div>
