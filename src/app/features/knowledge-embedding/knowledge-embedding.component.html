<div
  class="flex h-full bg-background-light dark:bg-background-dark font-sans text-neutral-900 dark:text-slate-100 transition-colors overflow-hidden">

  <div class="flex-1 flex flex-col pt-8 pb-10 px-8 lg:px-16 overflow-y-auto w-full max-w-5xl mx-auto no-scrollbar">

    <!-- Top Breadcrumb & Actions -->
    <div class="flex items-center justify-between mb-8 shrink-0">
      <div class="flex items-center gap-3">
        <button (click)="goBack()"
          class="p-2 rounded-full hover:bg-neutral-200 dark:hover:bg-white/10 transition-colors text-neutral-600 dark:text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>
        <div>
          <div class="flex items-center text-sm text-neutral-500 dark:text-slate-400 gap-2 mb-1">
            <span class="hover:text-primary cursor-pointer transition-colors" (click)="goBack()">知识空间</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m9 18 6-6-6-6" />
            </svg>
            <span class="text-neutral-900 dark:text-slate-200 font-medium">知识库管理与配置</span>
          </div>
          <h1 class="text-2xl font-bold tracking-tight">{{ documentName() }}</h1>
        </div>
      </div>
      <div>
        <button (click)="resetConfig()"
          class="px-4 py-2 border border-neutral-300 dark:border-white/20 bg-white dark:bg-surface-dark text-neutral-700 dark:text-slate-300 rounded-lg text-sm font-medium hover:bg-neutral-50 dark:hover:bg-white/10 transition-colors shadow-sm mr-3">
          重置默认
        </button>
        <button (click)="buildIndex()" [disabled]="isBuilding()"
          class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors shadow-sm shadow-primary/30 disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isBuilding() ? '构建中...' : '保存并构建索引' }}
        </button>
      </div>
    </div>

    <!-- Horizontal Flowchart -->
    <div class="mb-10 relative">
      <div class="flex items-center justify-between relative z-10">
        <div *ngFor="let step of steps; let i = index" class="flex flex-col items-center group relative flex-1">
          <!-- Connector Line -->
          <div *ngIf="i < steps.length - 1"
            class="absolute top-5 left-[50%] right-[-50%] h-0.5 bg-neutral-200 dark:bg-white/10 z-0">
            <div class="h-full bg-primary transition-all duration-500"
              [style.width]="currentStep() > step.id ? '100%' : '0%'"></div>
          </div>

          <!-- Step Circle -->
          <button (click)="currentStep.set(step.id)"
            [class.border-primary]="currentStep() >= step.id"
            [class.bg-primary]="currentStep() >= step.id"
            [class.text-white]="currentStep() >= step.id"
            [class.scale-110]="currentStep() === step.id"
            [class.shadow-lg]="currentStep() === step.id"
            [ngClass]="{'shadow-primary/30': currentStep() === step.id}"
            class="w-10 h-10 rounded-full border-2 border-neutral-300 dark:border-white/20 bg-white dark:bg-surface-dark flex items-center justify-center mb-3 transition-all duration-300 z-10 relative">
            <span *ngIf="currentStep() <= step.id" class="text-sm font-bold">{{ step.id }}</span>
            <svg *ngIf="currentStep() > step.id" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </button>

          <!-- Step Title & Info -->
          <div class="text-center px-2">
            <div class="text-xs font-bold uppercase tracking-wider mb-0.5"
              [class.text-primary]="currentStep() === step.id" [class.text-neutral-500]="currentStep() !== step.id">
              {{ step.subtitle }}
            </div>
            <div class="flex items-center justify-center gap-1">
              <span class="text-sm font-medium whitespace-nowrap">{{ step.title }}</span>
              <!-- Help Icon for Step Meaning -->
              <div class="group/tooltip relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="text-neutral-400 hover:text-primary cursor-help">
                  <circle cx="12" cy="12" r="10" />
                  <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                  <path d="M12 17h.01" />
                </svg>
                <div
                  class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 p-2 bg-neutral-900 text-white text-[11px] leading-relaxed rounded-lg opacity-0 invisible group-hover/tooltip:opacity-100 group-hover/tooltip:visible transition-all z-50 shadow-xl border border-white/10">
                  {{ step.description }}
                  <div class="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-neutral-900">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="space-y-6">

      <!-- Step 1: Data Preparation -->
      <app-kl-step-preparation *ngIf="currentStep() === 1"
        [chunkSize]="chunkSize()" (chunkSizeChange)="chunkSize.set($event)"
        [chunkOverlap]="chunkOverlap()" (chunkOverlapChange)="chunkOverlap.set($event)"
        [separators]="separators()" (separatorsChange)="separators.set($event)"
        class="block animate-in fade-in slide-in-from-bottom-4 duration-300">
      </app-kl-step-preparation>

      <!-- Step 2: Indexing -->
      <app-kl-step-indexing *ngIf="currentStep() === 2"
        [embeddingModel]="embeddingModel()" (embeddingModelChange)="embeddingModel.set($event)"
        [vectorStore]="vectorStore()" (vectorStoreChange)="vectorStore.set($event)"
        class="block animate-in fade-in slide-in-from-bottom-4 duration-300">
      </app-kl-step-indexing>

      <!-- Step 3: Retrieval Strategy -->
      <app-kl-step-retrieval *ngIf="currentStep() === 3"
        [topK]="topK()" (topKChange)="topK.set($event)"
        [scoreThreshold]="scoreThreshold()" (scoreThresholdChange)="scoreThreshold.set($event)"
        [enableHybridSearch]="enableHybridSearch()" (enableHybridSearchChange)="enableHybridSearch.set($event)"
        [alphaWeight]="alphaWeight()" (alphaWeightChange)="alphaWeight.set($event)"
        class="block animate-in fade-in slide-in-from-bottom-4 duration-300">
      </app-kl-step-retrieval>

      <!-- Step 4: Generation -->
      <app-kl-step-generation *ngIf="currentStep() === 4"
        [generationModel]="generationModel()" (generationModelChange)="generationModel.set($event)"
        [temperature]="temperature()" (temperatureChange)="temperature.set($event)"
        [systemPrompt]="systemPrompt()" (systemPromptChange)="systemPrompt.set($event)"
        class="block animate-in fade-in slide-in-from-bottom-4 duration-300">
      </app-kl-step-generation>

      <!-- Step 5: Evaluation -->
      <app-kl-step-evaluation *ngIf="currentStep() === 5"
        [enableEvaluation]="enableEvaluation()" (enableEvaluationChange)="enableEvaluation.set($event)"
        [evaluationMetrics]="evaluationMetrics()" (evaluationMetricsChange)="evaluationMetrics.set($event)"
        class="block animate-in fade-in slide-in-from-bottom-4 duration-300">
      </app-kl-step-evaluation>

      <!-- Simulated Progress Area -->
      <div *ngIf="isBuilding() || buildLogs().length > 0"
        class="bg-neutral-900 rounded-xl shadow-sm p-6 overflow-hidden border border-neutral-800 text-green-400 font-mono text-sm tracking-tight animate-in fade-in slide-in-from-bottom-4 duration-500 mb-8">
        <div class="flex items-center gap-3 mb-4 text-white">
          <svg *ngIf="isBuilding()" class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          <svg *ngIf="!isBuilding()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="text-green-500">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <path d="m9 11 3 3L22 4" />
          </svg>
          <span>{{ isBuilding() ? 'System Executing [INGEST_TASK_RUNNING]...' : 'System Executing [INGEST_TASK_COMPLETE]' }}</span>
          <span class="ml-auto text-primary font-bold">{{ buildProgress() }}%</span>
        </div>

        <div class="w-full bg-neutral-800 rounded-full h-1.5 mb-4 overflow-hidden">
          <div class="bg-primary h-1.5 rounded-full transition-all duration-300 ease-out"
            [ngStyle]="{'width': buildProgress() + '%'}"></div>
        </div>

        <div class="space-y-1 h-32 overflow-y-auto w-full no-scrollbar flex flex-col justify-end">
          <div *ngFor="let log of buildLogs()" class="opacity-80 animate-in fade-in slide-in-from-bottom-1">
            $> {{ log }}...
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
