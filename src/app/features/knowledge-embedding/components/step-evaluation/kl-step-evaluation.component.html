<div class="bg-white dark:bg-surface-dark rounded-xl border border-neutral-200 dark:border-white/10 shadow-sm p-6 lg:p-8 transition-colors">
  <div class="flex items-center gap-3 mb-6">
    <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" />
        <path d="m9 12 2 2 4-4" />
      </svg>
    </div>
    <div>
      <h2 class="text-lg font-semibold">RAG 系统量化评估 (Evaluation)</h2>
      <p class="text-sm text-neutral-500 dark:text-slate-400">引入一套标准的方法论，对系统的回答质量进行客观验证。</p>
    </div>
  </div>

  <div class="space-y-6">
    <label
      class="flex items-center gap-3 cursor-pointer p-4 rounded-xl border border-dashed border-neutral-300 dark:border-white/10 bg-neutral-50 dark:bg-white/5">
      <div class="relative flex items-center">
        <input type="checkbox" [ngModel]="enableEvaluation()" (ngModelChange)="onEnableChange($event)"
          class="sr-only peer">
        <div
          class="w-11 h-6 bg-neutral-300 dark:bg-white/20 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600">
        </div>
      </div>
      <div>
        <span class="text-sm font-bold block">启用自动评估工作流</span>
        <span class="text-xs text-neutral-500">构建完成后自动触发一组测试用例进行打分</span>
      </div>
    </label>

    <div *ngIf="enableEvaluation()" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div
        *ngFor="let metric of ['Faithfulness', 'Answer Relevancy', 'Context Precision', 'Context Recall', 'Harmfulness']"
        class="p-4 border rounded-xl transition-all cursor-pointer flex items-center justify-between"
        (click)="toggleMetric(metric)"
        [ngClass]="evaluationMetrics().includes(metric) ? 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/20' : 'border-neutral-200 dark:border-white/10'">
        <span class="text-sm font-medium">{{ metric }}</span>
        <svg *ngIf="evaluationMetrics().includes(metric)" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round" class="text-indigo-600">
          <path d="M20 6 9 17l-5-5" />
        </svg>
      </div>
    </div>

    <div *ngIf="enableEvaluation()"
      class="p-4 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-900/30 rounded-lg flex gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-yellow-600 dark:text-yellow-500 shrink-0">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      <p class="text-xs text-yellow-700 dark:text-yellow-200 leading-relaxed">提示：评估过程将消耗额外的 Token，并可能延长构建时间。建议在生产环境上线前开启。</p>
    </div>
  </div>
</div>
