<div class="bg-white dark:bg-surface-dark rounded-xl border border-neutral-200 dark:border-white/10 shadow-sm p-6 lg:p-8 transition-colors">
  <div class="flex items-center gap-3 mb-6">
    <div class="p-2 bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-lg">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2V8" />
        <path d="M12 16V22" />
        <path d="M4.93 4.93L9.17 9.17" />
        <path d="M14.83 14.83L19.07 19.07" />
        <path d="M2 12H8" />
        <path d="M16 12H22" />
        <path d="M4.93 19.07L9.17 14.83" />
        <path d="M14.83 9.17L19.07 4.93" />
      </svg>
    </div>
    <div>
      <h2 class="text-lg font-semibold">大模型生成设置 (Generation)</h2>
      <p class="text-sm text-neutral-500 dark:text-slate-400">配置推理模型及其生成策略，控制输出的创造性与格式。</p>
    </div>
  </div>

  <div class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div>
        <label class="block text-sm font-medium mb-2">推理大语言模型</label>
        <div class="relative">
          <select [ngModel]="generationModel()" (ngModelChange)="onModelChange($event)"
            class="w-full px-4 py-2 border border-neutral-300 dark:border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm appearance-none bg-neutral-50 dark:bg-background-dark text-neutral-900 dark:text-white transition-colors">
            <option value="gpt-4o">gpt-4o (High Quality)</option>
            <option value="gpt-4o-mini">gpt-4o-mini (Cost Efficient)</option>
            <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
            <option value="qwen-max">通义千问 Qwen-Max</option>
          </select>
          <div
            class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-neutral-500 dark:text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="text-sm font-medium">核采样温度 (Temperature)</label>
          <span class="text-sm font-bold text-orange-600">{{ temperature() }}</span>
        </div>
        <input type="range" min="0" max="1" step="0.1" [ngModel]="temperature()"
          (ngModelChange)="onTemperatureChange($event)"
          class="w-full accent-orange-500 bg-neutral-200 dark:bg-white/10 h-2 rounded-lg appearance-none cursor-pointer">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-2">系统提示词模版 (System Prompt)</label>
      <textarea [ngModel]="systemPrompt()" (ngModelChange)="onPromptChange($event)" rows="4"
        class="w-full px-4 py-3 border border-neutral-300 dark:border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm bg-neutral-50 dark:bg-background-dark text-neutral-900 dark:text-white transition-colors resize-none leading-relaxed"
        placeholder="输入系统提示词..."></textarea>
      <p class="text-xs text-neutral-500 dark:text-slate-500 mt-2">提示：可以使用 &#123;context&#125; 和 &#123;query&#125; 作为占位符。</p>
    </div>
  </div>
</div>
